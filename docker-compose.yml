services:
  postgres:
    image: postgres:16-alpine
    container_name: bdsnowflake-postgres
    environment:
      POSTGRES_DB: petshop
      POSTGRES_USER: petshop
      POSTGRES_PASSWORD: petshop
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/sql:ro
      - ./исходные данные:/data/csv:ro
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petshop -d petshop"]
      interval: 5s
      timeout: 5s
      retries: 10
